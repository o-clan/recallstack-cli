name: Publish CLI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-cli-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Check CLI release version
        id: cli_version
        shell: bash
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          echo "name=$package_name" >> "$GITHUB_OUTPUT"
          echo "version=$package_version" >> "$GITHUB_OUTPUT"
          if npm view "$package_name@$package_version" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "CLI $package_name@$package_version already exists on npm."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "CLI $package_name@$package_version will be published."
          fi

      - name: Build CLI
        if: steps.cli_version.outputs.publish == 'true'
        run: npm run build

      - name: Run CLI tests
        if: steps.cli_version.outputs.publish == 'true'
        run: npm run test

      - name: Publish CLI
        if: steps.cli_version.outputs.publish == 'true'
        run: npm publish --access public --provenance
